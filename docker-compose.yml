version: "3.8"
services:
  db:
    image: postgres:15
    container_name: rbac_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - rbac_pgdata:/var/lib/postgresql/data

volumes:
  rbac_pgdata: